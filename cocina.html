    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 880;
            gainNode.gain.value = 0.3;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            oscillator.stop(audioCtx.currentTime + 0.5);
        } catch(e) { console.log("Audio no soportado"); }

    function obtenerIngredientesCrepaNormal(nombreProducto) {
        const match = nombreProducto.match(/🥞 Crepa \(([^,]+), ([^,]+), ([^)]+)\)/);
        if (!match) return "No se pudo parsear la crepa normal.";
        const sabor = match[1].trim();
        const fruta = match[2].trim();
        const topping = match[3].trim();
        let frutaTexto = "";
        if (fruta === "Fresas") frutaTexto = "2 a 3 fresas medianas cortadas en rebanadas";
        else if (fruta === "Plátano") frutaTexto = "½ plátano cortada en rebanadas";
        else if (fruta === "Durazno") frutaTexto = "1 durazno cortado en rebanadas";
        else if (fruta === "Sin fruta") frutaTexto = "Sin fruta agregada";
        else frutaTexto = `${fruta} (cantidad estándar)`;
        let toppingTexto = "";
        if (topping === "Nuez") toppingTexto = "Espolvorear nuez dentro o fuera";
        else if (topping === "Chispas Chocolate") toppingTexto = "Espolvorear chispas de chocolate dentro o fuera";
        else if (topping === "Almendras") toppingTexto = "Espolvorear almendras dentro o fuera";
        else if (topping === "Sin topping") toppingTexto = "Sin topping";
        else toppingTexto = `${topping} (espolvorear al gusto)`;
        return `Base: Masa de crepa\nIngrediente (${sabor}): Encima de la tortilla de ${sabor}\nIngrediente (${fruta}): ${frutaTexto}\nIngrediente (${topping}): ${toppingTexto}`;
    }

    function obtenerIngredientes(nombreProducto) {
        if (nombreProducto.includes("🥞 Crepa (") || nombreProducto.includes("Crepa (")) {
            return obtenerIngredientesCrepaNormal(nombreProducto);
        }
        if (ingredientesMap[nombreProducto]) return ingredientesMap[nombreProducto];
        return `No se encontraron ingredientes específicos para "${nombreProducto}". Consultar receta base.`;
    }

    function renderPedidos() {
        db.collection("pedidos").where("estado", "in", ["pendiente", "preparando", "listo"]).orderBy("fecha", "desc").onSnapshot(snapshot => {
            const container = document.getElementById("pedidosContainer");
            if (snapshot.empty) { container.innerHTML = "<p>✅ No hay pedidos activos</p>"; return; }
            let html = "";
            snapshot.forEach(doc => {
                const p = doc.data();
                const allPrepared = p.items.every(i => i.prepared === true);
                let estadoBadge = "", claseListo = "";
                if (p.estado === "pendiente") estadoBadge = "🟡 Pendiente";
                else if (p.estado === "preparando") estadoBadge = "🔵 En preparación";
                else if (p.estado === "listo") {
                    estadoBadge = "🟢 LISTO PARA ENTREGAR";
                    claseListo = "listo";
                    if (ultimosEstados[doc.id] !== "listo") { playBeep(); ultimosEstados[doc.id] = "listo"; }
                }
                const pagadoBadge = p.pagado ? '<span class="badge-pagado">💰 Pagado</span>' : '<span class="badge-pagado" style="background:#ff9800;">💵 Pendiente pago</span>';
                html += `<div class="pedido ${claseListo}" data-id="${doc.id}">
                            <h3>🍽️ Pedido #${p.numero}  |  Total: $${p.total}  |  Hora: ${p.hora}  |  ${estadoBadge} ${pagadoBadge}</h3>`;
                if (p.notaGeneral) html += `<div class="nota-general">📝 NOTA GENERAL: ${p.notaGeneral}</div>`;
                html += `<div class="items">`;
                p.items.forEach((item, idx) => {
                    const estadoActual = item.prepared ? "listo" : "pendiente";
                    const btnTexto = item.prepared ? "✅ Listo" : "⏳ No listo";
                    const ingredientes = obtenerIngredientes(item.nombre);
                    const ingredientesHTML = ingredientes.replace(/\n/g, '<br>');
                    html += `<div class="producto-card">
                                <div class="producto-info">
                                    <div class="producto-nombre">${item.nombre} - $${item.precio}</div>
                                    <div class="producto-ingredientes">📋 ${ingredientesHTML}</div>
                                    ${item.nota ? `<div class="producto-nota">📌 Nota: ${item.nota}</div>` : ""}
                                </div>
                                <button class="btn-estado ${estadoActual}" data-pedido-id="${doc.id}" data-item-idx="${idx}">${btnTexto}</button>
                            </div>`;
                });
                html += `</div><div class="btn-group">`;
                if (allPrepared && p.estado !== "listo") {
                    html += `<button class="marcar-listo-btn" data-id="${doc.id}">✅ Marcar todo como listo</button>`;
                }
                html += `<button class="print-order-btn" data-id="${doc.id}" data-numero="${p.numero}">🖨️ Imprimir comanda</button>`;
                html += `</div></div>`;
            });
            container.innerHTML = html;

            document.querySelectorAll(".btn-estado").forEach(btn => {
                btn.addEventListener("click", async (e) => {
                    const pedidoId = btn.dataset.pedidoId;
                    const itemIdx = parseInt(btn.dataset.itemIdx);
                    const pedidoRef = db.collection("pedidos").doc(pedidoId);
                    const docSnap = await pedidoRef.get();
                    const items = docSnap.data().items;
                    items[itemIdx].prepared = !items[itemIdx].prepared;
                    let newEstado = docSnap.data().estado;
                    if (newEstado === "pendiente" && items.some(i => i.prepared)) newEstado = "preparando";
                    await pedidoRef.update({ items: items, estado: newEstado });
                });
            });
            document.querySelectorAll(".marcar-listo-btn").forEach(btn => {
                btn.addEventListener("click", async (e) => {
                    const id = btn.dataset.id;
                    const pedidoRef = db.collection("pedidos").doc(id);
                    const docSnap = await pedidoRef.get();
                    const items = docSnap.data().items.map(i => ({...i, prepared: true}));
                    await pedidoRef.update({ items: items, estado: "listo" });
                    alert("Pedido marcado como listo");
                });
            });
            document.querySelectorAll(".print-order-btn").forEach(btn => {
                btn.addEventListener("click", async () => {
                    const id = btn.dataset.id;
                    const numero = btn.dataset.numero;
                    const doc = await db.collection("pedidos").doc(id).get();
                    const p = doc.data();
                    let itemsHtml = "";
                    p.items.forEach(item => {
                        const ing = obtenerIngredientes(item.nombre);
                        itemsHtml += `<div><strong>${item.nombre}</strong> - $${item.precio}</div>
                                      <div style="font-size:0.8rem;">📋 ${ing.replace(/\n/g, '<br>')}</div>`;
                        if (item.nota) itemsHtml += `<div style="font-size:0.8rem;">📌 Nota: ${item.nota}</div>`;
                        itemsHtml += `<hr>`;
                    });
                    const printWindow = window.open('', '_blank');
                    printWindow.document.write(`
                        <html><head><title>Comanda #${numero}</title>
                        <style>body { font-family: monospace; width: 80mm; margin: 0 auto; padding: 10px; }</style>
                        </head><body>
                        <h2>🧇 MasQueWaffles</h2>
                        <p>Pedido #${numero} - ${p.hora}</p>
                        <hr>
                        ${itemsHtml}
                        <p>Nota general: ${p.notaGeneral || "Ninguna"}</p>
                        <p>¡Gracias!</p>
                        </body></html>
                    `);
                    printWindow.document.close();
                    printWindow.print();
                });
            });
        });
    }

    document.getElementById("printAllBtn").addEventListener("click", () => {
        const pedidos = document.querySelectorAll(".pedido");
        if (pedidos.length === 0) return alert("No hay pedidos");
        let allHtml = "";
        pedidos.forEach(ped => { allHtml += ped.outerHTML; });
        const ventana = window.open('', '_blank');
        ventana.document.write(`<html><head><title>Comandas</title><style>body { font-family: monospace; } .pedido { margin-bottom: 20px; break-after: page; } .btn-estado, .btn-group { display: none; }</style></head><body>${allHtml}</body></html>`);
        ventana.document.close();
        ventana.print();
    });

    renderPedidos();
</script>

</html>
